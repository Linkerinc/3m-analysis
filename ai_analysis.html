<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3M B2B AI 분석</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--surface3:#22223a;
  --border:#2a2a45;--accent:#6366f1;--accent2:#8b5cf6;--accent3:#06b6d4;
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;
  --text:#f0f0ff;--text2:#9898b8;--text3:#5555778;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* 로딩 */
#loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;}
.load-title{font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.load-sub{font-size:13px;color:var(--text2);}
.bar-wrap{width:240px;height:3px;background:var(--surface3);border-radius:99px;overflow:hidden;}
.bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:99px;transition:width .4s;}
.load-msg{font-size:12px;color:var(--text2);}

/* 헤더 */
#app{display:none;min-height:100vh;display:none;flex-direction:column;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.logo{font-size:15px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:8px;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent3);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.api-status{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}

/* 메인 레이아웃 */
.layout{display:flex;flex:1;height:calc(100vh - 52px);}

/* 왼쪽: 데이터 패널 */
.data-panel{width:280px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel-header{padding:16px 18px;border-bottom:1px solid var(--border);}
.panel-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}

/* 업로드 */
#upload-zone{margin:16px;border:1px dashed var(--border);border-radius:10px;padding:24px 16px;text-align:center;cursor:pointer;transition:.2s;}
#upload-zone:hover{border-color:var(--accent);background:var(--surface2);}
#upload-zone.drag{border-color:var(--accent3);background:var(--surface2);}
.up-icon{font-size:28px;margin-bottom:8px;}
.up-txt{font-size:12px;color:var(--text2);line-height:1.5;}
.up-btn{margin-top:10px;display:inline-block;padding:6px 16px;background:var(--accent);color:#fff;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;}

/* 데이터 정보 */
#data-info{display:none;padding:0 16px 16px;}
.info-badge{background:var(--surface3);border-radius:8px;padding:12px 14px;margin-bottom:10px;}
.info-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.info-value{font-size:13px;font-weight:600;color:var(--text);}
.col-list{margin-top:8px;display:flex;flex-direction:column;gap:3px;}
.col-item{font-size:11px;color:var(--text2);padding:3px 8px;background:var(--surface3);border-radius:4px;}

/* 예시 질문 */
.example-section{padding:0 16px;flex:1;overflow-y:auto;}
.example-title{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;}
.example-btn{width:100%;text-align:left;background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:8px 12px;border-radius:7px;font-size:12px;cursor:pointer;margin-bottom:6px;transition:.15s;font-family:'Pretendard',sans-serif;line-height:1.4;}
.example-btn:hover{border-color:var(--accent);color:var(--text);background:var(--surface3);}

/* API 키 입력 */
.api-section{padding:16px;border-top:1px solid var(--border);}
.api-label{font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.api-input{width:100%;background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:7px;font-size:12px;font-family:'Pretendard',sans-serif;}
.api-input::placeholder{color:var(--text2);}
.api-save-btn{width:100%;margin-top:6px;padding:7px;background:var(--surface3);border:1px solid var(--border);color:var(--text2);border-radius:7px;font-size:12px;cursor:pointer;font-family:'Pretendard',sans-serif;transition:.15s;}
.api-save-btn:hover{border-color:var(--accent);color:var(--accent);}

/* 오른쪽: 채팅 패널 */
.chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* 채팅 메시지 영역 */
#chat-area{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;}

/* 웰컴 화면 */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;text-align:center;}
.welcome-icon{font-size:48px;}
.welcome-title{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.welcome-sub{font-size:14px;color:var(--text2);line-height:1.6;max-width:400px;}

/* 메시지 버블 */
.msg{display:flex;gap:12px;max-width:100%;}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.msg.user .msg-avatar{background:var(--accent);font-size:12px;font-weight:700;color:#fff;}
.msg.ai .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--accent3));font-size:14px;}
.msg-content{flex:1;min-width:0;}
.msg.user .msg-content{display:flex;justify-content:flex-end;}
.msg-bubble{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:14px;line-height:1.6;max-width:85%;}
.msg.user .msg-bubble{background:var(--accent);border-color:var(--accent);color:#fff;border-radius:12px 12px 2px 12px;}
.msg.ai .msg-bubble{border-radius:2px 12px 12px 12px;}
.msg-time{font-size:10px;color:var(--text2);margin-top:4px;padding:0 4px;}
.msg.user .msg-time{text-align:right;}

/* AI 응답 콘텐츠 */
.ai-response{display:flex;flex-direction:column;gap:12px;width:100%;}
.insight-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:14px;line-height:1.7;color:var(--text);}
.insight-box p{margin-bottom:8px;}
.insight-box p:last-child{margin-bottom:0;}
.insight-box strong{color:var(--accent3);font-weight:600;}
.chart-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.chart-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;}
.chart-wrap{height:260px;position:relative;}
.table-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.table-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;padding:12px 16px;border-bottom:1px solid var(--border);}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:var(--surface3);padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);white-space:nowrap;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid var(--border);transition:.1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--surface3);}
tbody td{padding:9px 14px;white-space:nowrap;}

/* 타이핑 인디케이터 */
.typing{display:flex;align-items:center;gap:4px;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:2px 12px 12px 12px;width:fit-content;}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:typing .8s infinite;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes typing{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

/* 입력창 */
.input-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--surface);}
.input-wrap{display:flex;gap:10px;align-items:flex-end;}
.input-box{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:14px;font-family:'Pretendard',sans-serif;resize:none;max-height:120px;line-height:1.5;transition:.15s;outline:none;}
.input-box:focus{border-color:var(--accent);}
.input-box::placeholder{color:var(--text2);}
.send-btn{width:44px;height:44px;border-radius:10px;background:var(--accent);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;}
.send-btn:hover{background:var(--accent2);}
.send-btn:disabled{background:var(--surface3);cursor:not-allowed;}
.input-hint{font-size:11px;color:var(--text2);margin-top:8px;text-align:center;}

/* 처리중 오버레이 */
#proc-bar{display:none;position:fixed;top:52px;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3));animation:shimmer 1.5s infinite;}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
#proc-bar.show{display:block;}
</style>
</head>
<body>

<div id="loading">
  <div class="load-title">🤖 AI 분석</div>
  <div class="load-sub">데이터 분석 엔진을 준비하는 중...</div>
  <div class="bar-wrap"><div class="bar" id="lbar"></div></div>
  <div class="load-msg" id="lmsg">Pyodide 로딩 중...</div>
</div>

<div id="proc-bar"></div>

<div id="app">
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      3M B2B AI 분석
    </div>
    <div class="api-status">
      <div class="status-dot" id="status-dot" style="background:var(--amber)"></div>
      <span id="status-txt">API 키 미설정</span>
    </div>
  </header>

  <div class="layout">
    <!-- 왼쪽: 데이터 패널 -->
    <div class="data-panel">
      <div class="panel-header">
        <div class="panel-title">데이터 설정</div>
      </div>

      <!-- 업로드 -->
      <div id="upload-zone" onclick="document.getElementById('fi').click()">
        <div class="up-icon">📊</div>
        <div class="up-txt">엑셀 파일을 업로드하면<br>AI가 데이터를 분석합니다</div>
        <div class="up-btn">파일 선택</div>
        <input type="file" id="fi" accept=".xlsx" style="display:none">
      </div>

      <!-- 데이터 정보 -->
      <div id="data-info">
        <div class="info-badge">
          <div class="info-label">파일</div>
          <div class="info-value" id="file-name">-</div>
        </div>
        <div class="info-badge">
          <div class="info-label">완료 건수</div>
          <div class="info-value" id="row-count">-</div>
        </div>
        <div class="info-badge">
          <div class="info-label">분석 기간</div>
          <div class="info-value" id="date-range">-</div>
        </div>
      </div>

      <!-- 예시 질문 -->
      <div class="example-section" id="example-section" style="display:none">
        <div class="example-title">💡 예시 질문</div>
        <button class="example-btn" onclick="useExample(this)">Division별 연간 매출을 비교해줘</button>
        <button class="example-btn" onclick="useExample(this)">월별 판매 추이를 차트로 보여줘</button>
        <button class="example-btn" onclick="useExample(this)">매출 상위 10개 제품 테이블로 알려줘</button>
        <button class="example-btn" onclick="useExample(this)">2024년 vs 2025년 YoY 성장률 분석해줘</button>
        <button class="example-btn" onclick="useExample(this)">이탈 위험 고객사를 찾아줘</button>
        <button class="example-btn" onclick="useExample(this)">가장 많이 함께 구매되는 제품 조합은?</button>
        <button class="example-btn" onclick="useExample(this)">지역별 매출 순위를 알려줘</button>
        <button class="example-btn" onclick="useExample(this)">ISD Division 월별 판매량 차트 그려줘</button>
      </div>

      <!-- API 키 -->
      <div class="api-section">
        <div class="api-label">Claude API 키</div>
        <input class="api-input" id="api-key" type="password" placeholder="sk-ant-api...">
        <button class="api-save-btn" onclick="saveApiKey()">저장</button>
      </div>
    </div>

    <!-- 오른쪽: 채팅 패널 -->
    <div class="chat-panel">
      <div id="chat-area">
        <div id="welcome">
          <div class="welcome-icon">🤖</div>
          <div class="welcome-title">AI 데이터 분석</div>
          <div class="welcome-sub">
            엑셀 파일을 업로드하고 궁금한 것을 한국어로 질문하세요.<br>
            차트, 테이블, 인사이트를 자동으로 만들어드립니다.
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrap">
          <textarea class="input-box" id="user-input" placeholder="질문을 입력하세요... (예: 월별 매출 추이를 차트로 보여줘)" rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>➤</button>
        </div>
        <div class="input-hint">Enter로 전송 · Shift+Enter로 줄바꿈 · 데이터 업로드 및 API 키 설정 후 사용 가능</div>
      </div>
    </div>
  </div>
</div>

<script>
let pyodide = null;
let dataContext = null; // 분석용 데이터 요약
let chatHistory = []; // 대화 히스토리
let apiKey = localStorage.getItem('claude_api_key') || '';
let chartInstances = {};
let chartCounter = 0;
let isLoading = false;

// ── API 키 초기화 ─────────────────────────────────────────
if(apiKey) {
  document.getElementById('api-key').value = apiKey;
  updateApiStatus(true);
}

function saveApiKey() {
  apiKey = document.getElementById('api-key').value.trim();
  localStorage.setItem('claude_api_key', apiKey);
  updateApiStatus(!!apiKey);
  checkReady();
}

function updateApiStatus(ok) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-txt');
  dot.style.background = ok ? 'var(--green)' : 'var(--amber)';
  txt.textContent = ok ? 'API 연결됨' : 'API 키 미설정';
}

// ── Pyodide 로딩 ──────────────────────────────────────────
async function initPyodide() {
  const bar = document.getElementById('lbar');
  const msg = document.getElementById('lmsg');
  const steps = [[20,'Pyodide 로딩 중...'],[50,'micropip 초기화...'],[75,'pandas 설치 중...'],[90,'openpyxl 설치 중...'],[98,'준비 중...']];
  let si = 0;
  const t = setInterval(() => { if(si < steps.length) { bar.style.width = steps[si][0]+'%'; msg.textContent = steps[si][1]; si++; } }, 1000);
  pyodide = await loadPyodide();
  await pyodide.loadPackage(['micropip']);
  await pyodide.runPythonAsync(`import micropip\nawait micropip.install(['pandas','openpyxl'])`);
  clearInterval(t);
  bar.style.width = '100%'; msg.textContent = '준비 완료!';
  await new Promise(r => setTimeout(r, 400));
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}
initPyodide();

// ── 파일 업로드 ──────────────────────────────────────────
document.getElementById('fi').addEventListener('change', async e => {
  const file = e.target.files[0];
  if(!file) return;
  showProc(true);

  pyodide.FS.writeFile('/data.xlsx', new Uint8Array(await file.arrayBuffer()));

  const result = await pyodide.runPythonAsync(`
import pandas as pd, json, numpy as np

df = pd.read_excel('/data.xlsx', sheet_name='주문')
df['주문자ID'] = df['주문자ID'].astype(str).str.strip()
df_done = df[df['처리상태'] == '완료'].copy()
AMT = '상품금액+부가세'
QTY = '수량'

years = sorted(df_done['주문일시(년)'].dropna().unique().tolist())
divs = sorted(df_done['Division'].dropna().unique().tolist())
total_amt = float(df_done[AMT].sum())
total_rows = len(df_done)
cust_cnt = int(df_done['주문자ID'].nunique())

# 월별 매출 요약
monthly = df_done.groupby(['주문일시(년)','주문일시(월)'])[AMT].sum().reset_index()
monthly_list = monthly.to_dict('records')

# Division별 매출
div_sales = df_done.groupby('Division')[AMT].sum().sort_values(ascending=False).to_dict()

# 상위 20 제품
top_prods = df_done.groupby('제품명')[AMT].sum().sort_values(ascending=False).head(20).to_dict()

# 고객사별 매출
cust_sales = df_done.groupby('주문자ID')[AMT].sum().sort_values(ascending=False).head(50).to_dict()

# 가맹점별
df_done['가맹점코드'] = df_done['가맹점코드'].apply(lambda x: str(int(float(x))) if str(x).replace('.','').isdigit() else str(x))
dealer_sales = df_done.groupby('가맹점코드')[AMT].sum().sort_values(ascending=False).head(20).to_dict()

# 가맹점별 연도별 매출
dealer_year = df_done.groupby(['가맹점코드','주문일시(년)'])[AMT].sum().reset_index()
dealer_year_dict = {}
for _, row in dealer_year.iterrows():
    code = str(row['가맹점코드'])
    year = int(row['주문일시(년)'])
    amt = float(row[AMT])
    if code not in dealer_year_dict:
        dealer_year_dict[code] = {}
    dealer_year_dict[code][year] = amt
# 상위 20개 가맹점만
top_dealers = list(dealer_sales.keys())[:20]
dealer_year_top = {k: dealer_year_dict.get(k, {}) for k in top_dealers}

json.dumps({
  'years': [int(y) for y in years],
  'divisions': divs,
  'total_amt': total_amt,
  'total_rows': total_rows,
  'cust_cnt': cust_cnt,
  'monthly': monthly_list,
  'div_sales': {str(k): float(v) for k,v in div_sales.items()},
  'top_prods': {str(k): float(v) for k,v in top_prods.items()},
  'cust_sales': {str(k): float(v) for k,v in cust_sales.items()},
  'dealer_sales': {str(k): float(v) for k,v in dealer_sales.items()},
  'dealer_year': {str(k): {str(yr): float(amt) for yr,amt in v.items()} for k,v in dealer_year_top.items()},
}, ensure_ascii=False, default=str)
`);

  dataContext = JSON.parse(result);
  dataContext.fileName = file.name;

  // UI 업데이트
  document.getElementById('file-name').textContent = file.name;
  document.getElementById('row-count').textContent = `${dataContext.total_rows.toLocaleString()}건`;
  document.getElementById('date-range').textContent = dataContext.years.join(' ~ ') + '년';
  document.getElementById('data-info').style.display = 'block';
  document.getElementById('example-section').style.display = 'block';
  document.getElementById('upload-zone').style.display = 'none';

  // 대화 초기화
  chatHistory = [];
  document.getElementById('welcome').style.display = 'none';

  // 시스템 메시지 표시
  addAiMessage(`📊 **데이터 로드 완료!**\n\n**${file.name}** 파일을 분석했습니다.\n\n- 완료 건수: **${dataContext.total_rows.toLocaleString()}건**\n- 분석 기간: **${dataContext.years.join('~')}년**\n- Division: **${dataContext.divisions.join(', ')}**\n- 고객사 수: **${dataContext.cust_cnt.toLocaleString()}개사**\n- 총 매출: **₩${(dataContext.total_amt/1e8).toFixed(1)}억**\n\n궁금한 것을 한국어로 질문해 주세요! 차트, 테이블, 분석 리포트를 자동으로 만들어드립니다.`);

  checkReady();
  showProc(false);
});

// 드래그앤드롭
const uz = document.getElementById('upload-zone');
uz.addEventListener('dragover', e => { e.preventDefault(); uz.classList.add('drag'); });
uz.addEventListener('dragleave', () => uz.classList.remove('drag'));
uz.addEventListener('drop', e => {
  e.preventDefault(); uz.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if(f) { const dt = new DataTransfer(); dt.items.add(f); document.getElementById('fi').files = dt.files; document.getElementById('fi').dispatchEvent(new Event('change')); }
});

// ── 메시지 전송 ──────────────────────────────────────────
function checkReady() {
  const ready = dataContext && apiKey;
  document.getElementById('send-btn').disabled = !ready || isLoading;
}

function handleKey(e) {
  if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function useExample(btn) {
  document.getElementById('user-input').value = btn.textContent;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const q = input.value.trim();
  if(!q || !dataContext || !apiKey || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  checkReady();

  // 사용자 메시지 추가
  addUserMessage(q);

  // 타이핑 인디케이터
  const typingId = addTyping();
  showProc(true);

  // 대화 히스토리에 추가
  chatHistory.push({ role: 'user', content: q });

  try {
    // Claude API 호출
    const systemPrompt = buildSystemPrompt();
    const response = await callClaudeAPI(systemPrompt, chatHistory);

    removeTyping(typingId);

    // 응답 파싱 및 렌더링
    const parsed = parseResponse(response);
    renderAiResponse(parsed, q);

    // 히스토리에 응답 추가 (텍스트만)
    chatHistory.push({ role: 'assistant', content: parsed.insight || response });

    // 히스토리 최대 10턴 유지
    if(chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

  } catch(err) {
    removeTyping(typingId);
    addAiMessage(`❌ 오류가 발생했습니다: ${err.message}\n\nAPI 키를 확인하거나 잠시 후 다시 시도해 주세요.`);
  }

  isLoading = false;
  showProc(false);
  checkReady();
}

// ── Claude API 호출 ──────────────────────────────────────
function buildSystemPrompt() {
  const ctx = dataContext;
  return `당신은 3M B2B 파트너몰 판매 데이터 전문 분석가입니다.

## 데이터 개요
- 파일: ${ctx.fileName}
- 완료 건수: ${ctx.total_rows.toLocaleString()}건
- 분석 기간: ${ctx.years.join('~')}년
- Division: ${ctx.divisions.join(', ')}
- 고객사 수: ${ctx.cust_cnt.toLocaleString()}개사
- 총 매출: ₩${(ctx.total_amt/1e8).toFixed(1)}억

## Division별 매출 (완료 건 기준)
${Object.entries(ctx.div_sales).map(([k,v])=>`- ${k}: ₩${(v/1e6).toFixed(0)}백만`).join('\n')}

## 월별 매출 데이터
${ctx.monthly.map(r=>`- ${r['주문일시(년)']}년 ${r['주문일시(월)']}월: ₩${(r['상품금액+부가세']/1e6).toFixed(0)}백만`).join('\n')}

## 상위 제품 매출
${Object.entries(ctx.top_prods).slice(0,10).map(([k,v])=>`- ${k}: ₩${(v/1e6).toFixed(0)}백만`).join('\n')}

## 가맹점별 매출 (상위 20)
${Object.entries(ctx.dealer_sales).slice(0,20).map(([k,v])=>`- 가맹점 ${k}: ₩${(v/1e6).toFixed(0)}백만`).join('\n')}

## 가맹점별 연도별 매출 (YoY 분석용)
${Object.entries(ctx.dealer_year||{}).map(([code, years]) => {
  const yrs = Object.entries(years).map(([y,v])=>`${y}년 ₩${(v/1e6).toFixed(0)}백만`).join(' / ');
  return `- 가맹점 ${code}: ${yrs}`;
}).join('\n')}

## 상위 고객사(주문자ID) 매출
${Object.entries(ctx.cust_sales).slice(0,10).map(([k,v])=>`- ${k}: ₩${(v/1e6).toFixed(0)}백만`).join('\n')}

## 응답 규칙
1. 반드시 한국어로 답변하세요.
2. 응답은 아래 JSON 형식으로만 반환하세요. 다른 텍스트 없이 순수 JSON만 반환하세요.
3. insight: 텍스트 분석 인사이트 (마크다운 사용 가능, **굵게**, 줄바꿈 \\n 사용)
4. chart: 차트 데이터 (필요한 경우만, null이면 생략)
5. table: 테이블 데이터 (필요한 경우만, null이면 생략)

## JSON 응답 형식
{
  "insight": "분석 텍스트...",
  "chart": {
    "type": "bar|line|pie|doughnut",
    "title": "차트 제목",
    "labels": ["레이블1", "레이블2"],
    "datasets": [
      {
        "label": "데이터셋명",
        "data": [숫자1, 숫자2]
      }
    ]
  },
  "table": {
    "title": "테이블 제목",
    "headers": ["컬럼1", "컬럼2"],
    "rows": [["값1", "값2"], ["값3", "값4"]]
  }
}`;
}

async function callClaudeAPI(systemPrompt, history) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      system: systemPrompt,
      messages: history,
    })
  });

  if(!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || `HTTP ${response.status}`);
  }

  const data = await response.json();
  return data.content[0].text;
}

// ── 응답 파싱 ────────────────────────────────────────────
function parseResponse(text) {
  try {
    // JSON 추출
    const match = text.match(/\{[\s\S]*\}/);
    if(match) return JSON.parse(match[0]);
  } catch(e) {}
  return { insight: text, chart: null, table: null };
}

// ── UI 렌더링 ────────────────────────────────────────────
function addUserMessage(text) {
  const area = document.getElementById('chat-area');
  const time = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="msg-avatar">나</div>
    <div class="msg-content">
      <div class="msg-bubble">${escHtml(text)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addAiMessage(text) {
  const area = document.getElementById('chat-area');
  const time = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-content">
      <div class="msg-bubble">${renderMarkdown(text)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function renderAiResponse(parsed, question) {
  const area = document.getElementById('chat-area');
  const time = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
  const div = document.createElement('div');
  div.className = 'msg ai';

  let contentHtml = '<div class="ai-response">';

  // 인사이트
  if(parsed.insight) {
    contentHtml += `<div class="insight-box">${renderMarkdown(parsed.insight)}</div>`;
  }

  // 차트
  const chartId = `chart-${++chartCounter}`;
  if(parsed.chart) {
    contentHtml += `
      <div class="chart-box">
        <div class="chart-title">${escHtml(parsed.chart.title || '차트')}</div>
        <div class="chart-wrap"><canvas id="${chartId}"></canvas></div>
      </div>`;
  }

  // 테이블
  if(parsed.table) {
    const headers = parsed.table.headers || [];
    const rows = parsed.table.rows || [];
    contentHtml += `
      <div class="table-box">
        <div class="table-title">${escHtml(parsed.table.title || '테이블')}</div>
        <div class="tbl-wrap">
          <table>
            <thead><tr>${headers.map(h=>`<th>${escHtml(String(h))}</th>`).join('')}</tr></thead>
            <tbody>${rows.map(row=>`<tr>${row.map(cell=>`<td>${escHtml(String(cell))}</td>`).join('')}</tr>`).join('')}</tbody>
          </table>
        </div>
      </div>`;
  }

  contentHtml += '</div>';

  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-content" style="width:100%">
      ${contentHtml}
      <div class="msg-time">${time}</div>
    </div>`;

  area.appendChild(div);
  area.scrollTop = area.scrollHeight;

  // 차트 렌더링 (DOM 추가 후)
  if(parsed.chart) {
    setTimeout(() => renderChart(chartId, parsed.chart), 100);
  }
}

function renderChart(canvasId, chartData) {
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;

  const COLORS = ['#6366f1','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6'];

  if(chartInstances[canvasId]) chartInstances[canvasId].destroy();

  const datasets = (chartData.datasets || []).map((ds, i) => ({
    label: ds.label || '',
    data: ds.data || [],
    backgroundColor: chartData.type === 'line'
      ? COLORS[i % COLORS.length] + '33'
      : (chartData.type === 'pie' || chartData.type === 'doughnut')
        ? COLORS.slice(0, (ds.data||[]).length)
        : COLORS[i % COLORS.length] + 'cc',
    borderColor: COLORS[i % COLORS.length],
    borderWidth: chartData.type === 'line' ? 2 : 1,
    borderRadius: chartData.type === 'bar' ? 4 : 0,
    fill: chartData.type === 'line',
    tension: 0.4,
    pointRadius: chartData.type === 'line' ? 3 : 0,
  }));

  chartInstances[canvasId] = new Chart(ctx.getContext('2d'), {
    type: chartData.type || 'bar',
    data: { labels: chartData.labels || [], datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#9898b8', font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => {
          const v = ctx.raw;
          return typeof v === 'number' && v > 100000
            ? ` ₩${(v/1e6).toFixed(0)}백만`
            : ` ${v}`;
        }}}
      },
      scales: chartData.type === 'pie' || chartData.type === 'doughnut' ? {} : {
        x: { ticks: { color: '#9898b8', font: { size: 11 } }, grid: { color: '#2a2a45' } },
        y: { ticks: { color: '#9898b8', font: { size: 10 }, callback: v => v > 100000 ? `₩${(v/1e6).toFixed(0)}M` : v }, grid: { color: '#2a2a45' } }
      }
    }
  });
}

function addTyping() {
  const area = document.getElementById('chat-area');
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = id;
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-content">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return id;
}

function removeTyping(id) {
  document.getElementById(id)?.remove();
}

// ── 유틸 ────────────────────────────────────────────────
function renderMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>')
    .replace(/^- (.+)/gm, '• $1');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showProc(v) { document.getElementById('proc-bar').classList.toggle('show', v); }
</script>
